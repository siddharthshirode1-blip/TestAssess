<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduAssess - Test Portal</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    // ==========================================
    // 🛑 PUT YOUR FIREBASE CONFIG HERE 🛑
    // ==========================================
    // Import the functions you need from the SDKs you need
    import { initializeApp } from "firebase/app";
    import { getAnalytics } from "firebase/analytics";
    // TODO: Add SDKs for Firebase products that you want to use
    // https://firebase.google.com/docs/web/setup#available-libraries

    // Your web app's Firebase configuration
    // For Firebase JS SDK v7.20.0 and later, measurementId is optional
    const firebaseConfig = {
    apiKey: "AIzaSyAVLsQHmckLpy92JkRws_suaPwuMRoSAMk",
    authDomain: "eduassess-bd881.firebaseapp.com",
    projectId: "eduassess-bd881",
    storageBucket: "eduassess-bd881.firebasestorage.app",
    messagingSenderId: "91008138957",
    appId: "1:91008138957:web:28f26e542ce985edbcf384",
    measurementId: "G-WPJ297M2BT"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const analytics = getAnalytics(app);

    // Initialize Firebase
    let auth, db;
    try {
      if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
      }
      auth = firebase.auth();
      db = firebase.firestore();
    } catch (error) {
      console.error("Firebase initialization error. Did you add your config?", error);
    }

    // --- Helper Functions ---
    const generateId = () => Math.random().toString(36).substr(2, 9);
    const generateTestCode = () => Math.random().toString(36).substring(2, 8).toUpperCase();
    const formatTime = (seconds) => {
      const m = Math.floor(seconds / 60);
      const s = seconds % 60;
      return `${m}m ${s}s`;
    };

    const compressImage = (file, callback) => {
      const reader = new FileReader();
      reader.onload = (event) => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          const MAX_WIDTH = 600;
          let width = img.width;
          let height = img.height;
          if (width > MAX_WIDTH) {
            height = Math.round((height * MAX_WIDTH) / width);
            width = MAX_WIDTH;
          }
          canvas.width = width;
          canvas.height = height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);
          callback(canvas.toDataURL('image/jpeg', 0.6));
        };
        img.src = event.target.result;
      };
      reader.readAsDataURL(file);
    };

    // --- Main App Component ---
    function App() {
      const [user, setUser] = useState(null);
      const [authLoading, setAuthLoading] = useState(true);
      const [message, setMessage] = useState({ text: '', type: '' });
      
      const [view, setView] = useState('home');
      const [allTests, setAllTests] = useState([]);
      const [allResults, setAllResults] = useState([]);
      
      const [newTest, setNewTest] = useState(getInitialTestState());
      const [studentInfo, setStudentInfo] = useState({ name: '', code: '' });
      const [activeTest, setActiveTest] = useState(null);
      const [studentAnswers, setStudentAnswers] = useState({});
      const [startTime, setStartTime] = useState(0);
      const [elapsedTime, setElapsedTime] = useState(0);
      const [timerInterval, setTimerInterval] = useState(null);
      const [studentScore, setStudentScore] = useState(null);

      const [selectedTestId, setSelectedTestId] = useState(null);
      const [selectedResult, setSelectedResult] = useState(null);
      const [testToDelete, setTestToDelete] = useState(null);

      function getInitialTestState() {
        return {
          title: '',
          showResultsImmediately: true,
          passingMarks: '',
          moderatedMarks: '',
          questions: [
            {
              id: generateId(),
              text: '',
              imageUrl: '',
              type: 'mcq',
              marks: 1,
              options: [
                { id: generateId(), text: 'Option A' },
                { id: generateId(), text: 'Option B' }
              ],
              correctOptionId: '',
              correctOptionIds: [],
              correctTextAnswer: ''
            }
          ]
        };
      }

      const showMessage = (text, type = 'info') => {
        setMessage({ text, type });
        setTimeout(() => setMessage({ text: '', type: '' }), 4000);
      };

      // --- Auth Effect ---
      useEffect(() => {
        if (!auth) {
            setAuthLoading(false);
            showMessage("Firebase not configured properly.", "error");
            return;
        }

        const initAuth = async () => {
          try {
            await auth.signInAnonymously();
          } catch (err) {
            console.error("Auth Error:", err);
            showMessage("Authentication failed. Check Firebase config.", "error");
          }
        };
        initAuth();

        const unsubscribe = auth.onAuthStateChanged((u) => {
          setUser(u);
          setAuthLoading(false);
        });
        return () => unsubscribe();
      }, []);

      // --- Data Fetching Effect ---
      useEffect(() => {
        if (!user || !db) return;

        const unsubTests = db.collection('tests').onSnapshot((snapshot) => {
          const tests = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          setAllTests(tests);
        }, (err) => console.error("Error fetching tests:", err));

        const unsubResults = db.collection('results').onSnapshot((snapshot) => {
          const results = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          setAllResults(results);
        }, (err) => console.error("Error fetching results:", err));

        return () => {
          unsubTests();
          unsubResults();
        };
      }, [user]);

      // --- Timer Effect ---
      useEffect(() => {
        if (view === 'take' && activeTest) {
          const interval = setInterval(() => {
            setElapsedTime(Math.floor((Date.now() - startTime) / 1000));
          }, 1000);
          setTimerInterval(interval);
          return () => clearInterval(interval);
        } else if (timerInterval) {
          clearInterval(timerInterval);
        }
      }, [view, activeTest, startTime]);

      // --- Handlers: Create Test ---
      const handleAddQuestion = () => {
        setNewTest({
          ...newTest,
          questions: [
            ...newTest.questions,
            {
              id: generateId(),
              text: '',
              imageUrl: '',
              type: 'mcq',
              marks: 1,
              options: [
                { id: generateId(), text: 'Option A' },
                { id: generateId(), text: 'Option B' }
              ],
              correctOptionId: '',
              correctOptionIds: [],
              correctTextAnswer: ''
            }
          ]
        });
      };

      const updateQuestion = (qIndex, updates) => {
        const updated = [...newTest.questions];
        updated[qIndex] = { ...updated[qIndex], ...updates };
        setNewTest({ ...newTest, questions: updated });
      };

      const handleAddOption = (qIndex) => {
        const q = newTest.questions[qIndex];
        const newOptions = [...q.options, { id: generateId(), text: `Option ${String.fromCharCode(65 + q.options.length)}` }];
        updateQuestion(qIndex, { options: newOptions });
      };

      const saveTest = async () => {
        if (!newTest.title.trim()) return showMessage("Please add a title to your test.", "error");

        const pMarks = parseInt(newTest.passingMarks);
        if (isNaN(pMarks) || pMarks < 0) return showMessage("Please enter a valid number for Passing Marks.", "error");

        if (newTest.moderatedMarks !== '') {
          const mMarks = parseInt(newTest.moderatedMarks);
          if (isNaN(mMarks) || mMarks < pMarks) {
            return showMessage("Moderated marks cannot be less than passing marks.", "error");
          }
        }
        
        let totalPossibleMarks = 0;
        for (let i = 0; i < newTest.questions.length; i++) {
          const q = newTest.questions[i];
          if (!q.text.trim()) return showMessage(`Question ${i + 1} is empty.`, "error");
          if (q.type === 'mcq' && !q.correctOptionId) return showMessage(`Select a correct option for Question ${i + 1}.`, "error");
          if (q.type === 'checkbox' && (!q.correctOptionIds || q.correctOptionIds.length === 0)) {
            return showMessage(`Select at least one correct option for Question ${i + 1}.`, "error");
          }
          const qMarks = parseInt(q.marks) || 1;
          if (isNaN(qMarks) || qMarks <= 0) return showMessage(`Set valid marks for Question ${i + 1}.`, "error");
          if (q.type !== 'text') totalPossibleMarks += qMarks;
        }

        try {
          const code = generateTestCode();
          await db.collection('tests').doc(code).set({
            ...newTest,
            passingMarks: parseInt(newTest.passingMarks),
            moderatedMarks: newTest.moderatedMarks !== '' ? parseInt(newTest.moderatedMarks) : '',
            totalAutoMarks: totalPossibleMarks,
            creatorId: user.uid,
            createdAt: Date.now()
          });
          
          showMessage(`Test created! Your code is ${code}`, "success");
          setNewTest(getInitialTestState());
          setView('dashboard');
        } catch (err) {
          console.error(err);
          showMessage("Failed to save test.", "error");
        }
      };

      const confirmDeleteTest = async () => {
        if (!testToDelete) return;
        try {
          await db.collection('tests').doc(testToDelete).delete();
          showMessage("Test deleted successfully.", "success");
          setTestToDelete(null);
        } catch (err) {
          console.error(err);
          showMessage("Failed to delete test.", "error");
        }
      };

      // --- Handlers: Take Test ---
      const joinTest = async () => {
        if (!studentInfo.name.trim() || !studentInfo.code.trim()) {
          return showMessage("Please enter your name and the test code.", "error");
        }
        const code = studentInfo.code.toUpperCase().trim();
        
        try {
          const docRef = await db.collection('tests').doc(code).get();
          if (docRef.exists) {
            setActiveTest({ id: docRef.id, ...docRef.data() });
            setStudentAnswers({});
            setStartTime(Date.now());
            setElapsedTime(0);
            setView('take');
          } else {
            showMessage("Test not found. Please check the code.", "error");
          }
        } catch (err) {
          console.error(err);
          showMessage("Error loading test.", "error");
        }
      };

      const submitTest = async () => {
        if (!activeTest) return;

        let score = 0;
        let hasManualGrading = false;

        activeTest.questions.forEach(q => {
          const studentAns = studentAnswers[q.id];
          const qMarks = parseInt(q.marks) || 1;

          if (q.type === 'mcq') {
            if (studentAns === q.correctOptionId) score += qMarks;
          } else if (q.type === 'checkbox') {
            const studentIds = studentAns || [];
            const correctIds = q.correctOptionIds || [];
            if (studentIds.length === correctIds.length && correctIds.every(id => studentIds.includes(id))) {
              score += qMarks;
            }
          } else if (q.type === 'text') {
            hasManualGrading = true;
          }
        });

        const timeTaken = Math.floor((Date.now() - startTime) / 1000);

        try {
          await db.collection('results').add({
            testId: activeTest.id,
            testTitle: activeTest.title,
            studentName: studentInfo.name,
            answers: studentAnswers,
            score,
            totalAutoMarks: activeTest.totalAutoMarks || score,
            hasManualGrading,
            totalQuestions: activeTest.questions.length,
            timeTaken,
            submittedAt: Date.now()
          });

          setStudentScore({ score, totalAutoMarks: activeTest.totalAutoMarks || score, timeTaken, hasManualGrading });
          setView('studentResult');
        } catch (err) {
          console.error(err);
          showMessage("Failed to submit test.", "error");
        }
      };

      // --- Renderers ---
      const renderMessage = () => {
        if (!message.text) return null;
        const bg = message.type === 'error' ? 'bg-red-500' : message.type === 'success' ? 'bg-green-500' : 'bg-blue-500';
        return (
          <div className={`fixed top-4 right-4 z-50 ${bg} text-white px-6 py-3 rounded-lg shadow-lg`}>
            {message.text}
          </div>
        );
      };

      if (authLoading) return <div className="min-h-screen flex items-center justify-center bg-gray-50 text-gray-600">Loading platform...</div>;

      return (
        <div className="min-h-screen bg-gray-50 text-slate-800 font-sans pb-40">
          {renderMessage()}
          
          {/* Delete Confirmation Modal */}
          {testToDelete && (
            <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center z-50 p-4">
              <div className="bg-white rounded-2xl p-6 max-w-sm w-full shadow-2xl">
                <h3 className="text-xl font-bold text-slate-800 mb-2">Delete Test?</h3>
                <p className="text-slate-500 mb-6">Are you sure you want to delete this test? This action cannot be undone.</p>
                <div className="flex space-x-3 justify-end">
                  <button onClick={() => setTestToDelete(null)} className="px-4 py-2 font-semibold text-slate-600 hover:bg-slate-100 rounded-xl transition-colors">Cancel</button>
                  <button onClick={confirmDeleteTest} className="px-4 py-2 font-semibold text-white bg-red-500 hover:bg-red-600 rounded-xl transition-colors"><i className="fas fa-trash mr-2"></i> Delete</button>
                </div>
              </div>
            </div>
          )}

          {/* Header Navigation */}
          <header className="bg-white shadow-sm px-6 py-4 flex justify-between items-center sticky top-0 z-40">
            <div className="flex items-center space-x-2 cursor-pointer" onClick={() => setView('home')}>
              <div className="bg-indigo-600 p-2 rounded-lg text-white">
                <i className="fas fa-file-alt text-xl"></i>
              </div>
              <h1 className="text-xl font-bold text-slate-800 tracking-tight">EduAssess</h1>
            </div>
            {view !== 'home' && view !== 'take' && (
              <button onClick={() => setView('home')} className="text-sm font-medium text-indigo-600 hover:text-indigo-800 transition-colors">
                Back to Home
              </button>
            )}
          </header>

          <main className="max-w-4xl mx-auto p-4 md:p-6">
            
            {/* --- HOME VIEW --- */}
            {view === 'home' && (
              <div className="space-y-8 mt-10">
                <div className="text-center space-y-4">
                  <h2 className="text-4xl md:text-5xl font-extrabold text-slate-900 tracking-tight">Interactive Testing Made Easy</h2>
                  <p className="text-lg text-slate-500 max-w-2xl mx-auto">Create comprehensive assessments or join a test instantly with a secure code.</p>
                </div>
                
                <div className="grid md:grid-cols-2 gap-6 max-w-3xl mx-auto mt-12">
                  <div onClick={() => setView('create')} className="bg-white rounded-2xl p-8 shadow-sm hover:shadow-md border border-slate-100 transition-all cursor-pointer group">
                    <div className="bg-blue-50 text-blue-600 w-16 h-16 rounded-2xl flex items-center justify-center mb-6 group-hover:scale-110 transition-transform">
                      <i className="fas fa-plus text-3xl"></i>
                    </div>
                    <h3 className="text-2xl font-bold mb-2">Create Test</h3>
                    <p className="text-slate-500 mb-6">Design a new test with multiple choice or text questions.</p>
                    <div className="flex items-center text-blue-600 font-semibold group-hover:translate-x-2 transition-transform">
                      Start creating <i className="fas fa-chevron-right ml-1"></i>
                    </div>
                  </div>

                  <div onClick={() => setView('join')} className="bg-white rounded-2xl p-8 shadow-sm hover:shadow-md border border-slate-100 transition-all cursor-pointer group">
                    <div className="bg-emerald-50 text-emerald-600 w-16 h-16 rounded-2xl flex items-center justify-center mb-6 group-hover:scale-110 transition-transform">
                      <i className="fas fa-play text-3xl"></i>
                    </div>
                    <h3 className="text-2xl font-bold mb-2">Give Test</h3>
                    <p className="text-slate-500 mb-6">Enter a test code provided by your teacher to start.</p>
                    <div className="flex items-center text-emerald-600 font-semibold group-hover:translate-x-2 transition-transform">
                      Join now <i className="fas fa-chevron-right ml-1"></i>
                    </div>
                  </div>
                </div>

                <div className="text-center mt-12">
                  <button onClick={() => setView('dashboard')} className="inline-flex items-center space-x-2 text-slate-500 hover:text-indigo-600 bg-white px-6 py-3 rounded-full shadow-sm border border-slate-200 transition-colors font-medium">
                    <i className="fas fa-columns"></i>
                    <span>Teacher Dashboard</span>
                  </button>
                </div>
              </div>
            )}

            {/* --- CREATE TEST VIEW --- */}
            {view === 'create' && (
              <div className="space-y-6">
                <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                  <h2 className="text-2xl font-bold mb-6">Test Settings</h2>
                  <div className="space-y-4">
                    <div>
                      <label className="block text-sm font-medium text-slate-700 mb-1">Test Title</label>
                      <input type="text" value={newTest.title} onChange={(e) => setNewTest({...newTest, title: e.target.value})} placeholder="e.g. Midterm History Exam" className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all" />
                    </div>
                    <div className="grid md:grid-cols-2 gap-4 border-t border-slate-100 pt-4 mt-4">
                      <div>
                        <label className="block text-sm font-medium text-slate-700 mb-1">Passing Marks</label>
                        <input type="number" min="0" value={newTest.passingMarks} onChange={(e) => setNewTest({...newTest, passingMarks: e.target.value})} placeholder="e.g. 5" className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all" />
                      </div>
                      <div>
                        <label className="block text-sm font-medium text-slate-700 mb-1">Expected Marks <span className="text-xs text-slate-400 font-normal">- Optional</span></label>
                        <input type="number" min="0" value={newTest.moderatedMarks} onChange={(e) => setNewTest({...newTest, moderatedMarks: e.target.value})} placeholder="e.g. 8" className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all" />
                      </div>
                    </div>
                    <div className="flex items-center space-x-3 pt-4 border-t border-slate-100 mt-4">
                      <input type="checkbox" id="showScores" checked={newTest.showResultsImmediately} onChange={(e) => setNewTest({...newTest, showResultsImmediately: e.target.checked})} className="w-5 h-5 text-indigo-600 rounded focus:ring-indigo-500" />
                      <label htmlFor="showScores" className="text-slate-700 select-none">Show scores to students immediately</label>
                    </div>
                  </div>
                </div>

                <div className="space-y-6">
                  {newTest.questions.map((q, qIndex) => (
                    <div key={q.id} className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 relative group">
                      <button onClick={() => { const updated = [...newTest.questions]; updated.splice(qIndex, 1); setNewTest({...newTest, questions: updated}); }} className="absolute top-6 right-6 text-slate-400 hover:text-red-500 transition-colors">
                        <i className="fas fa-trash"></i>
                      </button>

                      <div className="flex flex-wrap items-center justify-between mb-4 pr-8 gap-4">
                        <h3 className="font-semibold text-lg">Question {qIndex + 1}</h3>
                        <div className="flex space-x-3">
                          <div className="flex items-center bg-slate-50 border border-slate-200 rounded-lg px-2">
                            <label className="text-sm text-slate-500 mr-2 font-medium">Marks:</label>
                            <input type="number" min="1" value={q.marks || 1} onChange={(e) => updateQuestion(qIndex, { marks: e.target.value })} className="w-16 bg-transparent outline-none py-2 text-sm font-semibold" />
                          </div>
                          <select value={q.type} onChange={(e) => updateQuestion(qIndex, { type: e.target.value })} className="bg-slate-50 border border-slate-200 text-sm rounded-lg p-2 outline-none">
                            <option value="mcq">Single Choice</option>
                            <option value="checkbox">Multiple Selection</option>
                            <option value="text">Short Answer</option>
                          </select>
                        </div>
                      </div>

                      <div className="space-y-4">
                        <textarea value={q.text} onChange={(e) => updateQuestion(qIndex, { text: e.target.value })} placeholder="Type your question here..." className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all min-h-[100px]"></textarea>
                        
                        <div>
                          <div className="flex flex-col sm:flex-row gap-3">
                            <input type="text" value={q.imageUrl || ''} onChange={(e) => updateQuestion(qIndex, { imageUrl: e.target.value })} placeholder="Paste image URL here..." className="flex-1 p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all text-sm" />
                            <div className="relative flex items-center justify-center bg-slate-100 hover:bg-slate-200 border border-slate-200 rounded-xl px-4 py-2 cursor-pointer transition-colors">
                              <span className="text-sm font-semibold text-slate-600"><i className="fas fa-camera mr-2"></i>Upload</span>
                              <input type="file" accept="image/*" onChange={(e) => { if (e.target.files && e.target.files[0]) compressImage(e.target.files[0], (base64Str) => updateQuestion(qIndex, { imageUrl: base64Str })); }} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" />
                            </div>
                          </div>
                          {q.imageUrl && (
                            <div className="mt-3 rounded-xl overflow-hidden border border-slate-200 relative inline-block">
                              <button onClick={() => updateQuestion(qIndex, { imageUrl: '' })} className="absolute top-2 right-2 bg-white/80 p-1 rounded-full text-red-500 hover:bg-white"><i className="fas fa-trash"></i></button>
                              <img src={q.imageUrl} alt="preview" className="max-h-48 w-auto object-cover" onError={(e) => e.target.style.display='none'} />
                            </div>
                          )}
                        </div>

                        <div className="pt-4 border-t border-slate-100">
                          <h4 className="text-sm font-medium text-slate-700 mb-3">Answer Options / Key</h4>
                          {(q.type === 'mcq' || q.type === 'checkbox') ? (
                            <div className="space-y-3">
                              {q.options.map((opt, oIndex) => {
                                const isChecked = q.type === 'mcq' ? (q.correctOptionId === opt.id) : (q.correctOptionIds?.includes(opt.id));
                                return (
                                  <div key={opt.id} className="flex items-center space-x-3">
                                    <input type={q.type === 'mcq' ? 'radio' : 'checkbox'} name={`correct-${q.id}`} checked={isChecked} onChange={(e) => {
                                      if (q.type === 'mcq') updateQuestion(qIndex, { correctOptionId: opt.id });
                                      else {
                                        let newIds = [...(q.correctOptionIds || [])];
                                        if (e.target.checked) newIds.push(opt.id); else newIds = newIds.filter(id => id !== opt.id);
                                        updateQuestion(qIndex, { correctOptionIds: newIds });
                                      }
                                    }} className="w-5 h-5 text-indigo-600 focus:ring-indigo-500" />
                                    <div className="flex-1 flex items-center bg-slate-50 border border-slate-200 rounded-xl overflow-hidden focus-within:ring-2 focus-within:ring-indigo-500">
                                      <span className="bg-slate-200 px-4 py-3 font-semibold text-slate-600">{String.fromCharCode(65 + oIndex)}</span>
                                      <input type="text" value={opt.text} onChange={(e) => { const newOpts = [...q.options]; newOpts[oIndex].text = e.target.value; updateQuestion(qIndex, { options: newOpts }); }} className="w-full p-3 bg-transparent outline-none" />
                                    </div>
                                    {q.options.length > 2 && (
                                      <button onClick={() => {
                                        const newOpts = q.options.filter((_, idx) => idx !== oIndex);
                                        if (q.type === 'mcq') updateQuestion(qIndex, { options: newOpts, correctOptionId: q.correctOptionId === opt.id ? '' : q.correctOptionId });
                                        else updateQuestion(qIndex, { options: newOpts, correctOptionIds: (q.correctOptionIds || []).filter(id => id !== opt.id) });
                                      }} className="p-2 text-slate-400 hover:text-red-500 transition-colors"><i className="fas fa-trash"></i></button>
                                    )}
                                  </div>
                                )
                              })}
                              <button onClick={() => handleAddOption(qIndex)} className="text-sm text-indigo-600 font-medium hover:text-indigo-800 flex items-center mt-2 px-1"><i className="fas fa-plus mr-1"></i> Add Option</button>
                            </div>
                          ) : (
                            <div className="bg-yellow-50 p-4 rounded-xl border border-yellow-200 text-yellow-800 text-sm">
                              <p className="font-semibold mb-1">Manual Grading Required</p>
                              <p>Short answers are not auto-graded. Review them manually after submission.</p>
                            </div>
                          )}
                        </div>
                      </div>
                    </div>
                  ))}

                  <div className="flex justify-center mt-6">
                    <button onClick={handleAddQuestion} className="bg-white text-indigo-600 border-2 border-dashed border-indigo-200 hover:border-indigo-400 hover:bg-indigo-50 px-8 py-4 rounded-xl font-semibold flex items-center transition-all shadow-sm w-full justify-center">
                      <i className="fas fa-plus mr-2"></i> Add Another Question
                    </button>
                  </div>

                  <div className="fixed bottom-0 left-0 right-0 p-4 bg-white border-t border-slate-200 shadow-lg z-30">
                    <div className="max-w-4xl mx-auto flex justify-between items-center">
                      <div className="text-sm text-slate-500 font-medium">{newTest.questions.length} Question(s) added</div>
                      <button onClick={saveTest} className="bg-indigo-600 hover:bg-indigo-700 text-white px-8 py-3 rounded-xl font-semibold flex items-center shadow-lg transition-all"><i className="fas fa-save mr-2"></i> Save & Generate Code</button>
                    </div>
                  </div>
                </div>
              </div>
            )}

            {/* --- JOIN TEST VIEW --- */}
            {view === 'join' && (
              <div className="max-w-md mx-auto mt-20 bg-white p-8 rounded-3xl shadow-xl border border-slate-100">
                <div className="text-center mb-8">
                  <div className="bg-indigo-50 text-indigo-600 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4"><i className="fas fa-user text-2xl"></i></div>
                  <h2 className="text-2xl font-bold text-slate-900">Student Login</h2>
                  <p className="text-slate-500 mt-2">Enter your details to begin</p>
                </div>
                <div className="space-y-5">
                  <div>
                    <label className="block text-sm font-semibold text-slate-700 mb-2">Full Name</label>
                    <input type="text" value={studentInfo.name} onChange={(e) => setStudentInfo({...studentInfo, name: e.target.value})} placeholder="e.g. John Doe" className="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none text-lg" />
                  </div>
                  <div>
                    <label className="block text-sm font-semibold text-slate-700 mb-2">Test Code</label>
                    <input type="text" value={studentInfo.code} onChange={(e) => setStudentInfo({...studentInfo, code: e.target.value.toUpperCase()})} placeholder="e.g. A1B2C3" className="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none text-lg uppercase tracking-widest font-mono" maxLength={6} />
                  </div>
                  <button onClick={joinTest} className="w-full bg-indigo-600 hover:bg-indigo-700 text-white p-4 rounded-xl font-bold text-lg shadow-md transition-all mt-4">Start Test</button>
                </div>
              </div>
            )}

            {/* --- TAKE TEST VIEW --- */}
            {view === 'take' && activeTest && (
              <div className="space-y-6">
                <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex justify-between items-center sticky top-20 z-30">
                  <div>
                    <h2 className="text-xl font-bold">{activeTest.title}</h2>
                    <p className="text-sm text-slate-500">Student: {studentInfo.name}</p>
                  </div>
                  <div className="flex items-center space-x-2 bg-indigo-50 text-indigo-700 px-4 py-2 rounded-lg font-mono font-bold text-lg">
                    <i className="fas fa-clock"></i><span>{formatTime(elapsedTime)}</span>
                  </div>
                </div>

                <div className="space-y-8">
                  {activeTest.questions.map((q, index) => (
                    <div key={q.id} className="bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-slate-100">
                      <div className="flex space-x-4 mb-6">
                        <div className="bg-indigo-100 text-indigo-700 font-bold w-10 h-10 rounded-full flex items-center justify-center shrink-0">{index + 1}</div>
                        <div className="pt-2 text-lg text-slate-800 font-medium whitespace-pre-wrap">
                          {q.text} {q.type === 'checkbox' && <span className="text-sm text-indigo-600 block mt-1">(Select all that apply)</span>}
                          <span className="block mt-2 text-sm font-bold text-slate-400">[{q.marks || 1} Mark(s)]</span>
                        </div>
                      </div>
                      
                      {q.imageUrl && (
                        <div className="ml-14 mb-6">
                          <img src={q.imageUrl} alt="Question figure" className="max-h-64 rounded-xl border border-slate-200 object-contain" />
                        </div>
                      )}

                      <div className="ml-14">
                        {(q.type === 'mcq' || q.type === 'checkbox') ? (
                          <div className="space-y-3">
                            {q.options.map((opt, oIdx) => {
                              const isSelected = q.type === 'mcq' ? studentAnswers[q.id] === opt.id : (studentAnswers[q.id] || []).includes(opt.id);
                              return (
                                <label key={opt.id} className={`flex items-center p-4 rounded-xl border-2 cursor-pointer transition-all ${isSelected ? 'border-indigo-500 bg-indigo-50' : 'border-slate-100 bg-white hover:border-slate-300'}`}>
                                  <input type={q.type === 'mcq' ? 'radio' : 'checkbox'} name={`q-${q.id}`} value={opt.id} checked={isSelected} onChange={(e) => {
                                    if (q.type === 'mcq') setStudentAnswers({...studentAnswers, [q.id]: e.target.value});
                                    else {
                                      let currentAns = studentAnswers[q.id] || [];
                                      if (e.target.checked) currentAns = [...currentAns, opt.id];
                                      else currentAns = currentAns.filter(id => id !== opt.id);
                                      setStudentAnswers({...studentAnswers, [q.id]: currentAns});
                                    }
                                  }} className="hidden" />
                                  <span className={`w-6 h-6 border-2 flex items-center justify-center mr-4 shrink-0 ${q.type === 'checkbox' ? 'rounded' : 'rounded-full'} ${isSelected ? 'border-indigo-600 bg-indigo-600' : 'border-slate-300'}`}>
                                    {isSelected && (q.type === 'mcq' ? <span className="w-2.5 h-2.5 bg-white rounded-full"></span> : <i className="fas fa-check text-white text-xs"></i>)}
                                  </span>
                                  <span className="font-medium text-slate-700"><span className="text-slate-400 mr-2">{String.fromCharCode(65 + oIdx)}.</span>{opt.text}</span>
                                </label>
                              );
                            })}
                          </div>
                        ) : (
                          <textarea value={studentAnswers[q.id] || ''} onChange={(e) => setStudentAnswers({...studentAnswers, [q.id]: e.target.value})} placeholder="Type your answer here..." className="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all min-h-[120px]" />
                        )}
                      </div>
                    </div>
                  ))}
                </div>

                <div className="flex justify-end pt-6">
                  <button onClick={submitTest} className="bg-indigo-600 hover:bg-indigo-700 text-white px-10 py-4 rounded-xl font-bold text-lg shadow-lg transition-all">Submit Test</button>
                </div>
              </div>
            )}

            {/* --- STUDENT RESULT VIEW --- */}
            {view === 'studentResult' && studentScore && activeTest && (
              <div className="max-w-2xl mx-auto mt-16 bg-white p-10 rounded-3xl shadow-xl border border-slate-100 text-center">
                <div className="w-24 h-24 bg-green-100 text-green-500 rounded-full flex items-center justify-center mx-auto mb-6"><i className="fas fa-check-circle text-5xl"></i></div>
                <h2 className="text-3xl font-bold mb-2">Test Submitted Successfully!</h2>
                <p className="text-slate-500 mb-8">Thank you, {studentInfo.name}. Your responses have been recorded.</p>
                
                {activeTest.showResultsImmediately ? (
                  <div className="bg-slate-50 p-8 rounded-2xl border border-slate-200 mb-8">
                    <h3 className="text-xl font-semibold text-slate-700 mb-6">Your Performance</h3>
                    <div className="grid grid-cols-2 gap-4">
                      <div className="bg-white p-4 rounded-xl border border-slate-100 shadow-sm relative">
                        <div className="text-4xl font-black text-indigo-600 mb-1">{studentScore.score}<span className="text-xl text-slate-400">/{studentScore.totalAutoMarks}</span></div>
                        <div className="text-sm font-medium text-slate-500 uppercase tracking-wide">Auto Score</div>
                        {studentScore.hasManualGrading && <div className="absolute top-2 right-2 text-xs font-bold bg-yellow-100 text-yellow-700 px-2 py-1 rounded">+ Pending</div>}
                      </div>
                      <div className="bg-white p-4 rounded-xl border border-slate-100 shadow-sm">
                        <div className="text-4xl font-black text-indigo-600 mb-1">{formatTime(studentScore.timeTaken)}</div>
                        <div className="text-sm font-medium text-slate-500 uppercase tracking-wide">Time Taken</div>
                      </div>
                    </div>
                  </div>
                ) : (
                  <div className="bg-yellow-50 text-yellow-800 p-4 rounded-xl mb-8">Results will be published by your teacher later.</div>
                )}
                <button onClick={() => { setView('home'); setStudentInfo({name:'', code:''}); }} className="bg-slate-800 hover:bg-slate-900 text-white px-8 py-3 rounded-xl font-semibold transition-colors">Return Home</button>
              </div>
            )}

            {/* --- TEACHER DASHBOARD VIEW --- */}
            {view === 'dashboard' && (
              <div className="space-y-8">
                <div className="flex justify-between items-center bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                  <div>
                    <h2 className="text-2xl font-bold text-slate-800">My Tests</h2>
                    <p className="text-slate-500">Manage and view results for tests you've created.</p>
                  </div>
                  <button onClick={() => setView('create')} className="bg-indigo-50 text-indigo-600 px-4 py-2 rounded-lg font-semibold flex items-center hover:bg-indigo-100 transition-colors"><i className="fas fa-plus mr-2"></i> New Test</button>
                </div>

                <div className="grid gap-4">
                  {allTests.filter(t => t.creatorId === user?.uid).length === 0 ? (
                    <div className="text-center p-12 bg-white rounded-2xl border border-slate-100">
                      <div className="text-slate-300 mb-4"><i className="fas fa-file-alt text-5xl"></i></div>
                      <h3 className="text-lg font-semibold text-slate-600 mb-2">No tests created yet</h3>
                      <p className="text-slate-400">Create your first test to see it here.</p>
                    </div>
                  ) : (
                    allTests.filter(t => t.creatorId === user?.uid).sort((a,b) => b.createdAt - a.createdAt).map(test => {
                      const submissions = allResults.filter(r => r.testId === test.id).length;
                      return (
                        <div key={test.id} className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex flex-col md:flex-row justify-between items-start md:items-center gap-4 hover:shadow-md transition-all">
                          <div>
                            <div className="flex items-center space-x-3 mb-1">
                              <h3 className="text-xl font-bold text-slate-800">{test.title}</h3>
                              <span className="bg-blue-100 text-blue-700 text-xs px-2 py-1 rounded-md font-mono font-bold tracking-widest border border-blue-200">CODE: {test.id}</span>
                            </div>
                            <p className="text-sm text-slate-500">{new Date(test.createdAt).toLocaleDateString()} • {test.questions?.length || 0} Questions</p>
                            <p className="text-xs text-slate-400 mt-1">Pass: {test.passingMarks || 0} {test.moderatedMarks ? `| Expected: ${test.moderatedMarks}` : ''}</p>
                          </div>
                          
                          <div className="flex items-center space-x-4 w-full md:w-auto">
                            <div className="bg-slate-50 px-4 py-2 rounded-lg text-center flex-1 md:flex-none">
                              <div className="text-2xl font-black text-slate-700">{submissions}</div>
                              <div className="text-xs font-semibold text-slate-500 uppercase">Submissions</div>
                            </div>
                            <button onClick={() => { setSelectedTestId(test.id); setView('viewResults'); }} className="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-4 rounded-xl font-semibold transition-colors flex-1 md:flex-none">View Results</button>
                            <button onClick={() => setTestToDelete(test.id)} className="p-4 text-red-500 bg-red-50 hover:bg-red-100 rounded-xl transition-colors"><i className="fas fa-trash"></i></button>
                          </div>
                        </div>
                      )
                    })
                  )}
                </div>
              </div>
            )}

            {/* --- VIEW RESULTS FOR SPECIFIC TEST --- */}
            {view === 'viewResults' && selectedTestId && (
              <div className="space-y-6">
                {(() => {
                  const test = allTests.find(t => t.id === selectedTestId);
                  if (!test) return <div>Test not found</div>;
                  const testResults = allResults.filter(r => r.testId === selectedTestId).sort((a,b) => b.score - a.score);

                  return (
                    <>
                      <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex items-center space-x-4">
                        <button onClick={() => { setView('dashboard'); setSelectedResult(null); }} className="p-2 hover:bg-slate-100 rounded-full text-slate-500"><i className="fas fa-arrow-left"></i></button>
                        <div>
                          <h2 className="text-2xl font-bold text-slate-800">Results: {test.title}</h2>
                          <p className="text-slate-500 font-mono text-sm">Code: {test.id} • Passing: {test.passingMarks || 0}</p>
                        </div>
                      </div>

                      {!selectedResult ? (
                        <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                          {testResults.length === 0 ? (
                            <div className="p-12 text-center text-slate-500">No submissions yet.</div>
                          ) : (
                            <table className="w-full text-left">
                              <thead className="bg-slate-50 text-slate-600 font-semibold text-sm border-b border-slate-200">
                                <tr>
                                  <th className="p-4">Student Name</th>
                                  <th className="p-4">Score</th>
                                  <th className="p-4 hidden sm:table-cell">Time</th>
                                  <th className="p-4 hidden md:table-cell">Date</th>
                                  <th className="p-4 text-right">Action</th>
                                </tr>
                              </thead>
                              <tbody className="divide-y divide-slate-100 text-slate-800">
                                {testResults.map(r => {
                                  const passMarks = parseInt(test.passingMarks) || 0;
                                  const modMarks = test.moderatedMarks ? parseInt(test.moderatedMarks) : null;
                                  let rowColor = "bg-white", badgeColor = "bg-green-100 text-green-700";
                                  if (r.score < passMarks) { rowColor = "bg-red-50 text-red-900"; badgeColor = "bg-red-200 text-red-800"; }
                                  else if (modMarks !== null && r.score < modMarks) { rowColor = "bg-yellow-50 text-yellow-900"; badgeColor = "bg-yellow-200 text-yellow-800"; }

                                  return (
                                    <tr key={r.id} className={rowColor}>
                                      <td className="p-4 font-medium">{r.studentName}</td>
                                      <td className="p-4">
                                        <span className={`px-3 py-1 rounded-full font-bold ${badgeColor}`}>{r.score}/{r.totalAutoMarks || r.totalQuestions}</span>
                                        {r.hasManualGrading && <span className="ml-2 text-xs text-yellow-600 font-bold" title="Needs manual grading">📝</span>}
                                      </td>
                                      <td className="p-4 hidden sm:table-cell">{formatTime(r.timeTaken)}</td>
                                      <td className="p-4 hidden md:table-cell text-sm opacity-70">{new Date(r.submittedAt).toLocaleDateString()}</td>
                                      <td className="p-4 text-right"><button onClick={() => setSelectedResult(r)} className="text-indigo-600 font-semibold text-sm bg-white/50 px-3 py-1 rounded-lg">View Paper</button></td>
                                    </tr>
                                  )
                                })}
                              </tbody>
                            </table>
                          )}
                        </div>
                      ) : (
                        <div className="space-y-6">
                          <div className="bg-slate-800 text-white p-6 rounded-2xl flex flex-wrap justify-between items-center gap-4 shadow-lg">
                             <div>
                               <h3 className="text-xl font-bold">{selectedResult.studentName}'s Paper</h3>
                               <p className="text-slate-300">Submitted: {new Date(selectedResult.submittedAt).toLocaleString()}</p>
                             </div>
                             <div className="flex space-x-6">
                               <div className="text-center">
                                 <div className="text-3xl font-black">{selectedResult.score}/{selectedResult.totalAutoMarks || selectedResult.totalQuestions}</div>
                                 <div className="text-xs uppercase font-semibold text-slate-400">Auto Score</div>
                               </div>
                               <div className="text-center">
                                 <div className="text-3xl font-black">{formatTime(selectedResult.timeTaken)}</div>
                                 <div className="text-xs uppercase font-semibold text-slate-400">Time</div>
                               </div>
                             </div>
                             <button onClick={() => setSelectedResult(null)} className="text-slate-300 hover:text-white underline text-sm w-full md:w-auto text-right">Back to Roster</button>
                          </div>

                          <div className="space-y-4">
                            {test.questions.map((q, idx) => {
                              const sAns = selectedResult.answers[q.id];
                              let isCorrect = false, correctAnsDisplay = '', studentAnsDisplay = '';

                              if (q.type === 'mcq') {
                                isCorrect = sAns === q.correctOptionId;
                                correctAnsDisplay = q.options.find(o => o.id === q.correctOptionId)?.text || '';
                                studentAnsDisplay = q.options.find(o => o.id === sAns)?.text || '(No Answer)';
                              } else if (q.type === 'checkbox') {
                                const correctIds = q.correctOptionIds || [];
                                const studentIds = sAns || [];
                                isCorrect = studentIds.length === correctIds.length && correctIds.every(id => studentIds.includes(id));
                                correctAnsDisplay = q.options.filter(o => correctIds.includes(o.id)).map(o => o.text).join(', ');
                                studentAnsDisplay = studentIds.length > 0 ? q.options.filter(o => studentIds.includes(o.id)).map(o => o.text).join(', ') : '(No Answer)';
                              } else {
                                isCorrect = false;
                                correctAnsDisplay = 'Teacher Review Required';
                                studentAnsDisplay = sAns || '(No Answer)';
                              }

                              const cardColor = q.type === 'text' ? 'bg-blue-50 border-blue-200' : (isCorrect ? 'bg-green-50 border-green-200' : 'bg-red-50 border-red-200');

                              return (
                                <div key={q.id} className={`p-6 rounded-2xl border-2 ${cardColor}`}>
                                  <div className="flex justify-between items-start mb-3">
                                    <h4 className="font-semibold text-slate-800 pr-4">{idx + 1}. {q.text} {q.type === 'checkbox' && <span className="text-sm font-normal text-slate-500">(Multiple Selection)</span>}</h4>
                                    <span className="bg-white px-2 py-1 rounded text-xs font-bold text-slate-500 border border-slate-200 whitespace-nowrap">{q.marks || 1} Mark(s)</span>
                                  </div>
                                  <div className="grid sm:grid-cols-2 gap-4 mt-4 text-sm">
                                    <div className="bg-white p-3 rounded-lg border border-slate-100 shadow-sm">
                                      <span className="block text-slate-400 text-xs uppercase font-bold mb-1">Student Answer</span>
                                      <span className={`font-medium ${q.type === 'text' ? 'text-blue-700' : (isCorrect ? 'text-green-700' : 'text-red-700')}`}>{studentAnsDisplay}</span>
                                    </div>
                                    {(!isCorrect || q.type === 'text') && (
                                      <div className="bg-white p-3 rounded-lg border border-slate-100 shadow-sm">
                                        <span className="block text-slate-400 text-xs uppercase font-bold mb-1">{q.type === 'text' ? 'Grading Note' : 'Correct Answer'}</span>
                                        <span className="font-medium text-slate-800">{correctAnsDisplay}</span>
                                      </div>
                                    )}
                                  </div>
                                </div>
                              );
                            })}
                          </div>
                        </div>
                      )}
                    </>
                  );
                })()}
              </div>
            )}
          </main>
        </div>
      );
    }

    // Render the App
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
